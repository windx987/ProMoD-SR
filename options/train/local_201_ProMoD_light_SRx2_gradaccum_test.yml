
# Local smoke test for gradient accumulation.
# RTX 3090, 1 GPU, batch=2 x accum=4 = effective 8.
# Runs 100 iters (~2 min) — just enough to verify loss descends
# and LR scheduler steps fire every accum_iters iterations.

name: local_201_ProMoD_gradaccum_test
model_type: PFTModel
scale: 2
num_gpu: 1
manual_seed: 0

find_unused_parameters: true

datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: datasets/DIV2K/DIV2K_train_HR.lmdb
    dataroot_lq: datasets/DIV2K/DIV2K_train_LR_bicubic_X2.lmdb
    io_backend:
      type: lmdb

    gt_size: 128
    use_hflip: true
    use_rot: true

    num_worker_per_gpu: 2
    batch_size_per_gpu: 2
    dataset_enlarge_ratio: 1

    # gradient accumulation: effective batch = 2 x 4 x 1 GPU = 8
    accum_iters: 4
    use_grad_clip: false   # not needed at this scale

    prefetch_mode: ~       # disable cuda prefetcher for simplicity

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/Set5/x2
    dataroot_lq: datasets/TestDataSR/LR/LRBI/Set5/x2
    io_backend:
      type: disk

network_g:
  type: ProMoD
  upscale: 2
  in_chans: 3
  img_size: 64
  embed_dim: 52
  depths: [2, 4, 6, 6, 6]
  num_heads: 4
  num_topk: [1024, 1024,
              256, 256, 256, 256,
              128, 128, 128, 128, 128, 128,
              64, 64, 64, 64, 64, 64,
              32, 32, 32, 32, 32, 32]
  window_size: 32
  convffn_kernel_size: 7
  img_range: 1.
  mlp_ratio: 1
  upsampler: 'pixelshuffledirect'
  resi_connection: '1conv'
  use_checkpoint: false
  mod_warmup_layers: 2

path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

train:
  ema_decay: 0
  optim_g:
    type: AdamW
    lr: !!float 5e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [50, 80, 90]
    gamma: 0.5

  total_iter: 100
  warmup_iter: -1

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: 50
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: yes

logger:
  print_freq: 10
  save_checkpoint_freq: 100
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 4322
