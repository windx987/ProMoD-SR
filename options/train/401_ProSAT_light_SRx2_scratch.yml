
# general settings
name: 401_ProSAT_light_SRx2_scratch
model_type: PMDModel
scale: 2
num_gpu: 2
manual_seed: 0

find_unused_parameters: true

# dataset and data loader settings
# NOTE: ProSAT.md specifies DF2K; we train on DIV2K only so results stay
# directly comparable to the 30x PFT/ProMoD series (all DIV2K).
datasets:
  train:
    name: DIV2K
    type: PairedImageDataset
    dataroot_gt: /mnt/pvc-shared-pvc-datasets-04a32ccd/DIV2K/DIV2K_train_HR
    dataroot_lq: /mnt/pvc-shared-pvc-datasets-04a32ccd/DIV2K/DIV2K_train_LR_bicubic/X2
    filename_tmpl: '{}x2'
    io_backend:
      type: disk

    gt_size: 128
    use_hflip: true
    use_rot: true

    # data loader
    num_worker_per_gpu: 8
    batch_size_per_gpu: 16       # 2 GPU x batch 16 = effective 32 (ProSAT.md light recipe)
    dataset_enlarge_ratio: 1
    prefetch_mode: cuda
    pin_memory: true
    persistent_workers: true

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/Set5/GTmod12
    dataroot_lq: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/Set5/LRbicx2_matlab
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/Set14/GTmod12
    dataroot_lq: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/Set14/LRbicx2_matlab
    io_backend:
      type: disk

  val_3:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/B100/GTmod12
    dataroot_lq: /mnt/pvc-shared-pvc-datasets-04a32ccd/Evaluation/B100/LRbicx2_matlab
    io_backend:
      type: disk

# network structures
network_g:
  type: ProSAT
  upscale: 2
  in_chans: 3
  embed_dim: 60
  depths: [4, 4, 4, 4]
  num_heads: 6
  ffn_ratio: 2.0
  qkv_bias: true
  dta_m_ratio: 0.03
  dta_min_clusters: 16
  mod_warmup_layers: 2         # schedule: 2x1.0, 2x0.8, 4x0.6, 8x0.5 (avg r=0.625); active from iter 0
  img_range: 1.
  # 0.7736M params; 4.02G FLOPs @64x64 (16.6% below mod_disable dense)

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Muon                 # official torch.optim.Muon (needs SISR29 env, see set_MUON.md)
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]         # AdamW group (biases/norms/convs) only

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [500000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 500000
  warmup_iter: -1              # no lr warmup (ProSAT.md recipe)

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 5e3
  save_img: false

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 2
      test_y_channel: yes
    ssim:
      type: calculate_ssim
      crop_border: 2
      test_y_channel: yes

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
